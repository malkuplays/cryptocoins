<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="neonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="1"/>
      <stop offset="80%" stop-color="#00FF88" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="yGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="240" fill="none" stroke="#00FF88" stroke-width="8" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="220" fill="url(#neonGlow)" opacity="0.1" />
  
  <path d="M 256 280 L 256 400 M 150 160 L 256 280 M 362 160 L 256 280" 
        stroke="url(#yGradient)" 
        stroke-width="50" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)"/>
</svg>
